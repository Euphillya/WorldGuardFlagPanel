prefix = "<gold>[WorldGuardFlagPanel]</gold>"

# /wgfpanel command
command.players-only = "<red>This command is for players only.</red>"
command.no-permission = "<red>Insufficient permission.</red>"
command.no-region-manager = "<red>Unable to access the region manager.</red>"
command.region-not-found = "<red>Region not found: <region>.</red>"
command.not-owner = "<red>You are not the owner of this region.</red>"
command.no-region-here = "<yellow>You are not in any region. Specify one: /wgfpanel <region></yellow>"

# Panel
panel.title = "<gold>⚙ WGFlagPanel</gold>"
panel.region-label = "<gray>Region: </gray><aqua><bold><region></bold></aqua>"
panel.instruction = "<gray>Click a flag to toggle its value.</gray>"
